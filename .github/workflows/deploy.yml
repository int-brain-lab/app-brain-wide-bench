name: deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0b15a5ba8ccdc2ebd \
            --document-name AWS-RunShellScript \
            --parameters '{"commands":[
              "set -e",
              "cd /srv/app-brain-wide-bench",
              "git pull",
              "docker compose up -d --build",
              "docker compose exec -T web uv run alembic upgrade head",
              "curl -sf http://localhost/health | grep -q '\"status\":\"ok\"'"
            ]}' \
            --query 'Command.CommandId' --output text)

          echo "SSM command ID: $COMMAND_ID"

          # Poll until done (max 10 minutes)
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id i-0b15a5ba8ccdc2ebd \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded."
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id i-0b15a5ba8ccdc2ebd \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command."
          exit 1
