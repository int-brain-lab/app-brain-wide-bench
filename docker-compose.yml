services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: brainwidebench
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build:
      # Context is the parent dir so the editable ../ibl-benchmark dependency is reachable.
      context: ..
      dockerfile: app-brain-wide-bench/Dockerfile
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8080
    ports:
      - "80:8080"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ..
      dockerfile: app-brain-wide-bench/Dockerfile
    command: uv run celery -A app.worker worker --loglevel=info
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
