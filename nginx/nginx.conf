events {}

http {
    server {
        listen 80;
        server_name brainwidebench.iblcore.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name brainwidebench.iblcore.org;

        ssl_certificate     /etc/letsencrypt/live/brainwidebench.iblcore.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/brainwidebench.iblcore.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        client_max_body_size 512M;

        # Re-resolve upstream on each request so container IP changes after deploys don't cause 502.
        resolver 127.0.0.11 valid=5s;
        set $upstream http://web:8080;

        location / {
            proxy_pass $upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
