<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain-Wide Bench - My model</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-view="private">

    <div class="main-private">
      <nav class="nav" id="top-nav"></nav>
      <aside class="sidebar" id="side-nav"></aside>
      <div class="content-private">

        <div class="model-header">
          <div>
            <div class="model-title-row">
              <span class="model-title" id="model-title"></span>
            </div>
            <div class="detail-meta" id="model-meta"></div>
            <div class="task-badge-row" id="model-badges"></div>
          </div>
          <div class="rank-block">
            <div class="rank-label">Overall rank</div>
            <div class="rank-num" id="rank-num"></div>
            <div class="rank-sub" id="rank-sub"></div>
            <a href="leaderboard.html" class="rank-link">View on leaderboard →</a>
          </div>
        </div>

        <div class="two-col">
          <div class="card">
            <div class="card-header"><span class="card-header__title">Model details</span></div>
            <div id="model-details"></div>
          </div>

          <div id="task-bars"></div>
        </div>


        <div class="header"><h2>Submissions</h2></div>
        <div class="lb-preview">
            <table class="lb-table">
              <thead>
                <tr>
                  <th style="width:30%">Label</th>
                  <th style="width:22%">Last updated</th>
                  <th style="width:16%">Status</th>
                  <th style="width:32%">Suites</th>
                </tr>
              </thead>
              <tbody id="submissions-list"></tbody>
            </table>
          </div>


      </div>
    </div>


<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/tables.js"></script>
<script src="js/nav_top.js"></script>
<script src="js/nav_side.js"></script>
<script src="js/model_details.js"></script>


</body>
</html>
